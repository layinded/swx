services:

  db:
    image: timescale/timescaledb-ha:pg17
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/home/postgres/pgdata/data
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/pgdata/data
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    command: [ "-c", "ai.ollama_host=http://host.docker.internal:11434" ]  # Uses local Ollama

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes



  vectorizer-worker:
    image: timescale/pgai-vectorizer-worker:v0.7.0
    restart: always
    environment:
      # SECURITY: Use environment variables instead of hardcoded credentials
      PGAI_VECTORIZER_WORKER_DB_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-postgres}
      OLLAMA_HOST: http://host.docker.internal:11434
    command: [ "--poll-interval", "5s", "--log-level", "DEBUG" ]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h db -U ${DB_USER:-postgres} -d ${DB_NAME:-postgres}" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "php", "-r", "file_get_contents('http://localhost:8080') ? exit(0) : exit(1);" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  swx-api:
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env  # ✅ Load environment variables from .env
    ports:
      - "8001:8000"
    command:
      - /app/.venv/bin/uvicorn
      - swx_core.main:app  # ✅ Updated to new structure
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    volumes:
      - ./swx_core:/app/swx_core  # ✅ Updated to new structure
      - ./swx_app:/app/swx_app  # ✅ Include swx_app for hot reload
      - ./pyproject.toml:/app/pyproject.toml
      - ./migrations:/app/migrations  # ✅ Ensures Alembic migrations persist
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_ENABLED=true


volumes:
  app-db-data:
  redis-data:

networks:
  default:
    name: swx-api-network

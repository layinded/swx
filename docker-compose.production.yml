services:

  # Caddy reverse proxy with automatic HTTPS
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - default
    environment:
      - DOMAIN=${DOMAIN}
      - CADDY_EMAIL=${CADDY_EMAIL:-${EMAIL:-admin@example.com}}
    healthcheck:
      test: [ "CMD", "caddy", "version" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - swx-api

  db:
    image: postgres:15
    restart: always
    networks:
      - default
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - default
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    # Production: Consider adding password protection
    # command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes

  # NOTE: Adminer is a development tool and should NOT be in production
  # Uncomment only if absolutely necessary for production debugging
  # adminer:
  #   image: adminer
  #   restart: always
  #   networks:
  #     - default
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   environment:
  #     - ADMINER_DESIGN=dracula
  #   healthcheck:
  #     test: [ "CMD", "php", "-r", "file_get_contents('http://localhost:8080') ? exit(0) : exit(1);" ]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 10s

  swx-api:
    image: "swx-api:latest"
    restart: always
    networks:
      - default
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - DOCKERIZED=true
      - DB_HOST=db
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - SENTRY_DSN=${SENTRY_DSN}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_ENABLED=true
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - /bin/bash
      - -c
      - |
        bash /app/scripts/prestart.sh
        exec /app/.venv/bin/uvicorn swx_core.main:app --host 0.0.0.0 --port 8000 --workers 4
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/utils/health-check" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  app-db-data:
  redis-data:
  caddy-data:
  caddy-config:

networks:
  default:
    name: swx-api-network

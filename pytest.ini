[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (require database/redis)
    feature: Feature tests (end-to-end scenarios)
    e2e: End-to-end tests (full stack)
    cli: CLI command tests
    slow: Slow tests (skip with -m "not slow")
    container: Service container tests
    guard: Guard system tests
    event: Event bus tests
    webhook: Webhook tests
    plugin: Plugin system tests
    upgrade: Upgrade safety tests
    stress: Stress/performance tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
env =
    TESTING=true
    DATABASE_URL=postgresql+asyncpg://test:test@localhost:5432/swx_test
    REDIS_URL=redis://localhost:6379/15